<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Kinerja UPT Bengkulu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .pln-blue { color: #0076c8; }
        .bg-pln { background-color: #0076c8; }
        tbody tr:nth-child(even) { background-color: #f8fafc; }
        .status-baik { background-color: #dcfce7; color: #166534; }
        .status-masalah { background-color: #fee2e2; color: #991b1b; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans p-6">
    <div class="max-w-7xl mx-auto">
        <header class="mb-6 border-b-4 border-blue-600 pb-4">
            <h1 class="text-2xl font-black pln-blue">PT PLN (PERSERO) - UPT BENGKULU</h1>
            <p class="text-[10px] font-bold text-slate-500 uppercase">Dashboard Kinerja Operasional (Mei 2026)</p>
        </header>
        <div class="overflow-x-auto bg-white rounded-lg shadow-sm border border-slate-200">
            <table class="w-full text-[10px] text-left border-collapse">
                <thead class="bg-blue-900 text-white uppercase">
                    <tr>
                        <th class="p-2 border">NO</th>
                        <th class="p-2 border">INDIKATOR KINERJA</th>
                        <th class="p-2 border text-center">BOBOT</th>
                        <th class="p-2 border text-center">TARGET S.D MEI</th>
                        <th class="p-2 border text-center">REALISASI S.D MEI</th>
                        <th class="p-2 border text-center">STATUS</th>
                    </tr>
                </thead>
                <tbody id="data-body" class="divide-y divide-slate-200">
                    <tr><td colspan="6" class="p-8 text-center text-slate-400">Loading data...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.3.2/papaparse.min.js"></script>
    <script>
        const sheetUrl = 'https://docs.google.com/spreadsheets/d/1GcyqF-CRESZyPRbeSObV7SWF-MseWjJtOmofF_4nPjQ/export?format=csv&gid=1877466739';
        Papa.parse(sheetUrl, {
            download: true,
            complete: function(results) {
                const tbody = document.getElementById('data-body');
                tbody.innerHTML = '';
                results.data.forEach((row) => {
                    if(row[1] && row[2]) {
                        const no = row[1];
                        const ind = row[2];
                        const bobot = row[3] || '-';
                        const target = row[8] || '-';
                        const real = row[9] || '-';
                        const status = (row[14] || '').toUpperCase();
                        
                        tbody.innerHTML += `
                            <tr class="hover:bg-blue-50">
                                <td class="p-2 border font-bold text-slate-500">${no}</td>
                                <td class="p-2 border font-medium text-slate-800">${ind}</td>
                                <td class="p-2 border text-center">${bobot}</td>
                                <td class="p-2 border text-center">${target}</td>
                                <td class="p-2 border text-center font-bold">${real}</td>
                                <td class="p-2 border text-center">
                                    <span class="px-2 py-0.5 rounded ${status.includes('MASALAH') ? 'status-masalah' : 'status-baik'}">
                                        ${status}
                                    </span>
                                </td>
                            </tr>`;
                    }
                });
            }
        });
    </script>
</body>
</html>
