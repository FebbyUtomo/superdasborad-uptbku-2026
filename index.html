<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>UPT Bengkulu Command</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.3.2/papaparse.min.js"></script>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen p-6">
    <header class="mb-10 text-center"><h1 class="text-3xl font-black text-blue-500 uppercase tracking-widest">Command Center</h1></header>
    <div id="grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4"></div>

    <script>
        const sheetUrl = 'https://docs.google.com/spreadsheets/d/1GcyqF-CRESZyPRbeSObV7SWF-MseWjJtOmofF_4nPjQ/export?format=csv&gid=1877466739';
        
        Papa.parse(sheetUrl, {
            download: true,
            complete: function(results) {
                const data = results.data.slice(9); // Skip header
                const grid = document.getElementById('grid');
                data.forEach(row => {
                    if(row[1] && row[1].length > 1) {
                        grid.innerHTML += `
                            <div class="bg-slate-900 p-4 rounded-xl border border-slate-800">
                                <h3 class="text-[10px] font-bold text-slate-500 uppercase">${row[1]}</h3>
                                <div class="text-xl font-mono">${row[9] || '0'}</div>
                                <div class="text-[10px] text-emerald-400">Target: ${row[8] || '0'}</div>
                            </div>`;
                    }
                });
            }
        });
    </script>
</body>
</html>
