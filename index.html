<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Kinerja UPT Bengkulu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .pln-blue { color: #0076c8; }
        .bg-pln { background-color: #0076c8; }
        tbody tr:nth-child(even) { background-color: #f8fafc; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans">
    <div class="max-w-6xl mx-auto p-6">
        <header class="mb-8 border-b-4 border-blue-600 pb-4">
            <h1 class="text-3xl font-black pln-blue tracking-tight">PT PLN (PERSERO) - UPT BENGKULU</h1>
            <p class="text-sm font-semibold text-slate-500 uppercase tracking-widest mt-1">Laporan Kinerja - Mei 2026</p>
        </header>

        <div class="overflow-x-auto bg-white rounded-xl shadow-lg border border-slate-200">
            <table class="w-full text-left text-sm">
                <thead class="bg-blue-600 text-white uppercase text-[11px] tracking-wider">
                    <tr>
                        <th class="p-4 w-16">No</th>
                        <th class="p-4">Indikator Kinerja</th>
                        <th class="p-4 text-center">Target S.D Mei</th>
                        <th class="p-4 text-center">Realisasi S.D Mei</th>
                        <th class="p-4 text-center">Status</th>
                    </tr>
                </thead>
                <tbody id="data-body" class="divide-y divide-slate-100 text-slate-700">
                    <!-- Data ditarik otomatis -->
                </tbody>
            </table>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.3.2/papaparse.min.js"></script>
    <script>
        const sheetUrl = 'https://docs.google.com/spreadsheets/d/1GcyqF-CRESZyPRbeSObV7SWF-MseWjJtOmofF_4nPjQ/export?format=csv&gid=1877466739';
        
        Papa.parse(sheetUrl, {
            download: true,
            complete: function(results) {
                const tbody = document.getElementById('data-body');
                // Data mulai dari baris setelah header (index 9)
                results.data.slice(9).forEach((row) => {
                    const no = row[1] ? row[1].trim() : "";
                    const indikator = row[2] ? row[2].trim() : "";
                    
                    // Hanya tampilkan baris yang punya nomor urut atau indikator
                    if(no !== "" && (no.match(/^\d+$/) || no.match(/^[a-z]$/))) {
                        const target = row[8] || '-';
                        const real = row[9] || '-';
                        
                        // Logika status: Jika target angka dan realisasi >= target
                        const isGood = parseFloat(real.replace(',','.')) >= parseFloat(target.replace(',','.') || 0);
                        
                        tbody.innerHTML += `
                            <tr class="hover:bg-blue-50 transition-colors">
                                <td class="p-4 font-bold text-slate-400">${no}</td>
                                <td class="p-4 font-medium">${indikator}</td>
                                <td class="p-4 text-center">${target}</td>
                                <td class="p-4 text-center font-bold text-blue-700">${real}</td>
                                <td class="p-4 text-center">
                                    <span class="px-3 py-1 rounded-full text-[10px] font-bold ${isGood ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}">
                                        ${isGood ? 'BAIK' : 'AWAS'}
                                    </span>
                                    /td>
                            </tr>;
                    }
                });
            }
        });
    </script>
</body>
</html>
`
