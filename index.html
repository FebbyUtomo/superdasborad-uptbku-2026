<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Kinerja UPT Bengkulu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .pln-blue { color: #0076c8; }
        .bg-pln { background-color: #0076c8; }
        .status-baik { background-color: #dcfce7; color: #166534; }
        .status-masalah { background-color: #fee2e2; color: #991b1b; }
        table { width: auto; min-width: 100%; }
        td, th { white-space: nowrap; padding: 0.5rem; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans p-4">
    <div class="max-w-[95vw] mx-auto">
        <header class="mb-4 border-b-4 border-blue-600 pb-2">
            <h1 class="text-xl font-black pln-blue">PT PLN (PERSERO) - UPT BENGKULU</h1>
            <p class="text-[9px] font-bold text-slate-500 uppercase">Dashboard Kinerja Operasional (Mei 2026)</p>
        </header>
        
        <div id="tables-container" class="space-y-6">
            <!-- Tabel Utama -->
            <div class="overflow-x-auto bg-white rounded-lg shadow border border-slate-200">
                <h2 class="bg-blue-900 text-white p-2 text-xs font-bold uppercase">Indikator Kinerja Utama</h2>
                <table class="w-full text-[9px] border-collapse" id="main-table">
                    <thead class="bg-slate-100 uppercase">
                        <tr>
                            <th>NO</th><th>INDIKATOR</th><th>BOBOT</th><th>TARGET</th><th>REALISASI</th><th>STATUS</th>
                        </tr>
                    </thead>
                    <tbody id="main-body" class="divide-y"></tbody>
                </table>
            </div>

            <!-- Tabel Kinerja Merah -->
            <div class="overflow-x-auto bg-white rounded-lg shadow border border-red-200">
                <h2 class="bg-red-800 text-white p-2 text-xs font-bold uppercase">Kinerja Merah (ABOF)</h2>
                <table class="w-full text-[9px] border-collapse" id="red-table">
                    <thead class="bg-slate-100 uppercase">
                        <tr>
                            <th>NO</th><th>STATUS</th><th>REALISASI/TINDAK LANJUT (%)</th>
                        </tr>
                    </thead>
                    <tbody id="red-body" class="divide-y"></tbody>
                </table>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.3.2/papaparse.min.js"></script>
    <script>
        const sheetUrl = 'https://docs.google.com/spreadsheets/d/1GcyqF-CRESZyPRbeSObV7SWF-MseWjJtOmofF_4nPjQ/export?format=csv&gid=1877466739';
        Papa.parse(sheetUrl, {
            download: true,
            complete: function(results) {
                const mainBody = document.getElementById('main-body');
                const redBody = document.getElementById('red-body');
                
                results.data.forEach((row) => {
                    // Tabel Utama (row 1-16)
                    if(row[1] && row[1].match(/^\d+$/)) {
                        mainBody.innerHTML += `<tr>
                            <td>${row[1]}</td><td>${row[2] || ''}</td><td>${row[3] || ''}</td>
                            <td>${row[8] || ''}</td><td>${row[9] || ''}</td>
                            <td class="${(row[14]||'').includes('MASALAH') ? 'status-masalah' : 'status-baik'}">${row[14]||''}</td>
                        </tr>`;
                    }
                    // Tabel Merah (ABOF)
                    if(row[1] && row[1].match(/^\d+$/) && row[16]) {
                        redBody.innerHTML += `<tr>
                            <td>${row[16]}</td><td>${row[17]||''}</td><td>${row[18]||''}</td>
                        </tr>`;
                    }
                });
            }
        });
    </script>
</body>
</html>
